# goreleaser v2 config for commit-composer.
#
# Run `goreleaser release --clean` on a tagged commit to:
#   1. build commit-composer for darwin/arm64 + darwin/amd64
#   2. archive each as commit-composer_<ver>_<os>_<arch>.tar.gz
#   3. publish the archives + checksums to a GitHub Release
#   4. push an updated Formula to the homebrew-tap repo
#
# Required env when running outside CI:
#   GITHUB_TOKEN           - PAT with `repo` scope on this repo
#   HOMEBREW_TAP_TOKEN     - PAT with `repo` scope on the homebrew-tap repo
#
# See docs/release.md for the one-time setup.

version: 2

project_name: commit-composer

before:
  hooks:
    - go mod tidy

builds:
  - id: commit-composer
    main: ./cmd/commit-composer
    binary: commit-composer
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}

archives:
  - id: commit-composer
    ids:
      - commit-composer
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      # Plugin files - copied to share/commit-composer/.claude-plugin so
      # users can `/plugin marketplace add /opt/homebrew/share/commit-composer`.
      # NOTE: .claude-plugin/bin/ is intentionally excluded - the launcher
      # would otherwise prefer the bundled stale binary over the brew one.
      #
      # Files are listed explicitly; goreleaser globs (`**/*`) interact
      # poorly with hidden parent directories like `.claude-plugin/`, so
      # globs would silently skip these files. Add new plugin files here.
      - .claude-plugin/marketplace.json
      - .claude-plugin/plugin.json
      - .claude-plugin/commands/commit-compose.md
      - .claude-plugin/commands/cc-commit.md
      - .claude-plugin/skills/commit-composer/SKILL.md
      - .claude-plugin/skills/cc-commit/SKILL.md
      - .claude-plugin/scripts/launch-commit-composer.sh
      - .claude-plugin/scripts/resolve-launcher.sh

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"

release:
  github:
    owner: mrcat71
    name: commit-composer
  draft: false
  prerelease: auto

brews:
  - name: commit-composer
    repository:
      owner: mrcat71
      name: homebrew-tap
      branch: main
      # Token resolution: HOMEBREW_TAP_TOKEN env var (set in CI as a secret).
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "brew: update {{ .ProjectName }} to {{ .Tag }}"
    homepage: https://github.com/mrcat71/commit-composer
    description: Mark and recompose git commits in a TUI, with Claude-driven multi-commit redesign.
    license: MIT
    install: |
      bin.install "commit-composer"
      # Ship the Claude Code plugin files so a single `brew install` gives
      # users the binary AND the slash command / skill / launcher. The path
      # `/opt/homebrew/share/commit-composer/.claude-plugin/` is stable across
      # versions (brew refreshes the symlink on every upgrade), so users
      # only need to run `/plugin marketplace add` once.
      (share/"commit-composer").install ".claude-plugin"
    test: |
      system "#{bin}/commit-composer", "--version"
